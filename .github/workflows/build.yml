name: Build distributions

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - 'setup.py'
      - 'pyproject.toml'
      - 'MANIFEST.in'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
      - 'Makefile'
      - 'gen_stubs.py'
      - 'scripts/**'
      - 'Modeling_Tool/**/*.py'
      - 'ExcelMaster/**/*.py'
      - 'Report/**/*.py'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_dist:
    name: Build wheel and sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Smoke install wheel
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          import Modeling_Tool
          import Modeling_Tool.WOE.WOE_Master
          import Modeling_Tool.Model.LRM_Tool
          import ExcelMaster.ExcelMaster
          import Report.Report_Tool
          print('SMF wheel ok:', Modeling_Tool.__name__)
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/*
          if-no-files-found: error

  release:
    name: Attach artifacts to GitHub Release
    needs: [build_dist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish_pypi:
    name: Publish to PyPI
    needs: [build_dist, release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/supermodelingfactory
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist

      - name: Publish to PyPI (trusted publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          verbose: true
