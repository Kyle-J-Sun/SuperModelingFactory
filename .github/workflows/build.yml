# =============================================================================
# Build wheels — cross-platform Cython compilation of SuperModelingFactory
# -----------------------------------------------------------------------------
# Trigger:
#   * git tag matching v*  → wheel set is built, attached to a GitHub Release,
#     and published to PyPI (publish_pypi job below)
#   * pull_request to main → smoke-test that PRs don't break the build
#   * workflow_dispatch    → manual rebuild from the Actions tab
#
# NOT triggered on push to main: cross-platform wheel builds (esp. Linux
# manylinux) take 20-40 min and are wasted CI time for documentation /
# CI-config / test-only commits. Real release verification happens at tag time.
#
# Outputs:
#   * one wheel per (OS × Python) combination, uploaded as build artifacts
#   * on tag push, an sdist + all wheels attached to the GitHub Release
#
# IMPORTANT — the produced wheel embeds the compiled .so / .pyd. The original
# .py sources of the closed-source modules are NOT shipped. Anyone receiving
# the wheel can run the package but cannot read the algorithm source.
# =============================================================================
name: Build wheels

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
    # Only run wheel builds for PRs that touch build-relevant files.
    # Pure-Python edits (e.g. ExcelMaster/*.py, README, tests) don't need
    # a 30-min cross-platform wheel verification.
    paths:
      - 'setup.py'
      - 'pyproject.toml'
      - 'MANIFEST.in'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
      - 'Makefile'
      - 'gen_stubs.py'
      - 'scripts/**'
      - 'Modeling_Tool/**/*.pyx'
      - 'Modeling_Tool/**/*.pxd'
      - 'Modeling_Tool/**/*.c'
      - 'Modeling_Tool/**/*.h'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Wheel · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so version-derivation tools (e.g. setuptools_scm,
          # if you add one later) work; harmless otherwise.
          fetch-depth: 0

      - name: Set up Python (host)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # cibuildwheel handles per-Python-version isolation internally; the host
      # Python above is only used to drive cibuildwheel itself.
      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.23
        env:
          # CIBW_BUILD comes from pyproject.toml ([tool.cibuildwheel].build).
          # We override here only to make the targets explicit in CI logs.
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          # Skip Python 3.13 on Windows. Reason: our closed-source .so/.pyd
          # are compiled against the numpy 1.x C-API (numpy<2 is hard-pinned in
          # pyproject.toml). numpy 1.x has no official cp313 wheel for
          # Windows, so pip builds numpy from source there — the resulting
          # numpy 1.26 + Python 3.13 + Windows combination is broken upstream
          # (RuntimeWarning: invalid value encountered in exp2/log10/nextafter,
          # followed by Access Violation 0xC0000005 at import time).
          # macOS/Linux cp313 build fine because manylinux/macOS provide
          # stable numpy 1.26 cp313 wheels.
          # Lift this skip after the extensions are rebuilt against numpy>=2.
          CIBW_SKIP: ${{ matrix.os == 'windows-latest' && 'cp313-*' || '' }}
          CIBW_BUILD_VERBOSITY: "1"

      - name: Verify wheels contain no closed-source .py
        run: |
          python -m pip install --quiet --upgrade pip
          # verify_protection.py only needs stdlib, no extra deps required.
          python scripts/verify_protection.py --wheelhouse

      - name: Upload wheels (per-OS artifact)
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Source distribution (no closed-source .py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build cython

      # We build an sdist mainly for PyPI completeness. MANIFEST.in *excludes*
      # the proprietary .py sources, so the sdist alone CANNOT be used to
      # reconstruct the algorithm — it only contains open-source modules,
      # stubs, license, README, setup.py, and the .c outputs of cythonize.
      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Attach artifacts to GitHub Release
    needs: [build_wheels, build_sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lah dist/

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist, release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/supermodelingfactory
    permissions:
      id-token: write   # required for OIDC / trusted publisher
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Strip non-distribution files from dist/
        run: |
          # PyPI only accepts .whl and .tar.gz; remove anything else just in case.
          find dist/ -type f ! \( -name "*.whl" -o -name "*.tar.gz" \) -delete
          ls -lah dist/

      - name: Publish to PyPI (trusted publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password / token here — relies on PyPI "trusted publisher"
          # binding configured at https://pypi.org/manage/project/.../settings/publishing/
          packages-dir: dist/
          skip-existing: true
          verbose: true
