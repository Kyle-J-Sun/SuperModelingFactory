name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch to save CI minutes.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: ${{ matrix.deps }} · Py${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
        deps: [legacy, modern, bleeding]

    steps:
      - name: Checkout main package
        uses: actions/checkout@v4
        with:
          path: SuperModelingFactory

      - name: Checkout test suite (private)
        uses: actions/checkout@v4
        with:
          repository: Kyle-J-Sun/SuperModelingFactory_pytest
          token: ${{ secrets.PYTEST_REPO_TOKEN }}
          path: SuperModelingFactory_pytest
          ref: main

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install base test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Install deps (legacy — numpy<2 / lightgbm<4 / pandas<2.3)
        if: matrix.deps == 'legacy'
        run: pip install "numpy<2" "scipy<1.13" "pandas>=2.0,<2.3" "lightgbm<4"

      - name: Install deps (modern — numpy 2.x / lightgbm 4.x / pandas 2.2.x)
        if: matrix.deps == 'modern'
        run: pip install "numpy>=2,<2.5" "scipy>=1.13" "pandas>=2.2,<2.3" "lightgbm>=4"

      - name: Install deps (bleeding — latest pandas, validates Bug 3 fix)
        if: matrix.deps == 'bleeding'
        shell: bash
        run: |
          set -o pipefail
          # numba (via shap) currently requires numpy <= 2.4; cap accordingly.
          pip install --no-cache-dir "numpy>=2.1,<2.5" "scipy>=1.14,<2" "pandas>=2.3,<3" "lightgbm>=4.3,<5" 2>&1 | tee bleeding-install.log || {
            tail -n 80 bleeding-install.log >&2
            excerpt=$(tail -n 80 bleeding-install.log | python -c 'import sys; print(sys.stdin.read()[-8000:].replace("%","%25").replace("\r","%0D").replace("\n","%0A"))')
            echo "::error title=bleeding dependency install failure::$excerpt"
            exit 1
          }

      - name: Install main package runtime deps
        working-directory: SuperModelingFactory
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY'
          import importlib
          packages = ["numpy", "scipy", "pandas", "lightgbm"]
          with open("/tmp/matrix-constraints.txt", "w", encoding="utf-8") as fh:
              for package in packages:
                  module = importlib.import_module(package)
                  fh.write(f"{package}=={module.__version__}\n")
          PY
          if [ -f requirements.txt ]; then
            if ! pip install -r requirements.txt -c /tmp/matrix-constraints.txt 2>&1 | tee /tmp/runtime-install.log; then
              echo "::warning::requirements install with constraints failed; retrying --no-deps plus optuna extras"
              pip install -r requirements.txt --no-deps -c /tmp/matrix-constraints.txt
              pip install colorlog statsmodels tqdm xlsxwriter Pillow optuna shap
            fi
          fi
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            pip install -e . --no-deps -c /tmp/matrix-constraints.txt || true
          fi
          pip install scikit-learn seaborn matplotlib openpyxl xgboost pyodps imbalanced-learn -c /tmp/matrix-constraints.txt

      - name: Show resolved versions
        run: |
          python - <<'PY'
          import importlib, sys
          mods = ["numpy","scipy","pandas","lightgbm","xgboost","sklearn"]
          print("python:", sys.version.split()[0])
          for m in mods:
              try:
                  print(f"{m}:", importlib.import_module(m).__version__)
              except Exception as e:
                  print(f"{m}: NOT INSTALLED ({e})")
          PY

      - name: Run pytest
        working-directory: SuperModelingFactory_pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/SuperModelingFactory
        run: |
          set +e
          python -m pytest --no-header -q -rN 2>&1 | tee pytest-output.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python - <<'PY'
          from pathlib import Path

          text = Path("pytest-output.log").read_text(errors="replace")
          lines = text.splitlines()
          excerpt = "\n".join(lines[-180:])
          excerpt = excerpt[-12000:]
          escaped = (
              excerpt.replace("%", "%25")
              .replace("\r", "%0D")
              .replace("\n", "%0A")
          )
          print(f"::error title=pytest failure excerpt::{escaped}")
          PY
          fi
          exit "$status"
